<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A simple calculator app built with HTML, CSS, and JavaScript. Developed by Dev Squad Alpha for Mayerfeld Consulting."
    />
    <title>
      Calculator app | Dev Squad Alpha - Darian Rončević, Artion Laska, Elly
      James Komunga | Mayerfeld Consulting
    </title>
    <link rel="stylesheet" href="style/style.css" />
    <script src="script/main.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Calculator App</h1>
    </header>
    <main>
      <div id="calculator">
        <input type="text" readonly id="display" />
        <div id="keys">
          <button class="backspace">⌫</button>
          <button>C</button>

          <button>7</button>
          <button>8</button>
          <button>9</button>
          <button>/</button>

          <button>4</button>
          <button>5</button>
          <button>6</button>
          <button>*</button>

          <button>1</button>
          <button>2</button>
          <button>3</button>
          <button>-</button>

          <button>0</button>
          <button>.</button>
          <button>=</button>
          <button>+</button>
        </div>
      </div>
    </main>
    <footer>&copy;</footer>
  </body>
</html>
