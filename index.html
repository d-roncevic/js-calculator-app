<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A simple calculator app built with HTML, CSS, and JavaScript. Developed by Dev Squad Alpha for Mayerfeld Consulting."
    />
    <title>
      Calculator app | Dev Squad Alpha - Darian Rončević, Artion Laska, Elly
      James Komunga | Mayerfeld Consulting
    </title>
    <link rel="stylesheet" href="style/style.css" />
    <script src="script/main.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Calculator App</h1>
    </header>
    <main>
      <div id="calculator">
        <input type="text" readonly id="display" />
        <div id="keys">
          <button onclick="percentage()">%</button>
          <button onclick="toggleSign()">+/-</button>
          <button class="backspace" onclick="backspace()">⌫</button>
          <button onclick="clearDisplay()">C</button>

          <button onclick="appendNumber('7')">7</button>
          <button onclick="appendNumber('8')">8</button>
          <button onclick="appendNumber('9')">9</button>
          <button onclick="setOperator('/')">/</button>

          <button onclick="appendNumber('4')">4</button>
          <button onclick="appendNumber('5')">5</button>
          <button onclick="appendNumber('6')">6</button>
          <button onclick="setOperator('*')">*</button>

          <button onclick="appendNumber('1')">1</button>
          <button onclick="appendNumber('2')">2</button>
          <button onclick="appendNumber('3')">3</button>
          <button onclick="setOperator('-')">-</button>

          <button onclick="appendNumber('0')">0</button>
          <button onclick="appendDecimal()">.</button>
          <button onclick="calculate()">=</button>
          <button onclick="setOperator('+')">+</button>
        </div>
      </div>
    </main>
    <footer>&copy;</footer>
  </body>
</html>
